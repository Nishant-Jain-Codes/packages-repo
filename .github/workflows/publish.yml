name: Publish (GitHub Packages)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Do not set registry-url here — it can force the default registry to GitHub Packages
          # and break installs of public packages (e.g. uuid). Scoped GitHub Packages auth is
          # handled via repo .npmrc (@aditya-sharma-salescode:registry=...) + NODE_AUTH_TOKEN.

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # pnpm does not always attach NODE_AUTH_TOKEN to GitHub Packages fetches unless .npmrc
      # contains //npm.pkg.github.com/:_authToken (setup-node used to add this via registry-url).
      - name: Install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          pnpm install --frozen-lockfile=false

      - name: Build
        run: pnpm -r --filter "!@salescode/content-management" build

      # npm/pnpm publish reads registry auth from .npmrc, not only NODE_AUTH_TOKEN in env.
      - name: Publish workspaces
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          pnpm -r --filter "!@salescode/content-management" publish --access=restricted --no-git-checks

